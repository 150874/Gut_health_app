{% extends "layout.html" %}
{% block content %}
<div class="row">
    <!-- Food Safety Checker -->
    <div class="col-md-6 mb-4">
        <div class="card p-4">
            <h3 class="h5 mb-3">Food Safety Checker</h3>
            <form action="/check" method="post">
                <div class="mb-3">
                    <input type="text" name="food" class="form-control" placeholder="Enter food (e.g., Coffee)" required>
                </div>
                <div class="mb-3">
                    <select name="condition" class="form-select">
                        <option value="gastritis">Gastritis</option>
                        <option value="gerd">GERD / Reflux</option>
                        <option value="hpylori">H. Pylori</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100">Check Safety</button>
            </form>

            {% if status %}
            <div class="mt-4 p-3 border rounded {% if status == 'avoid' %}bg-danger-subtle{% elif status == 'safe' %}bg-success-subtle{% else %}bg-warning-subtle{% endif %}">
                <strong>{{ food }}</strong> is <span class="badge {% if status == 'avoid' %}bg-danger{% elif status == 'safe' %}bg-success{% else %}bg-warning{% endif %}">{{ status }}</span> for {{ condition }}.
            </div>
            {% endif %}
        </div>
    </div>

    <!-- Quick Meal Log -->
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="h5 mb-3">Log a Meal</h3>
            <p class="text-muted small">Log what you just ate to help the app find patterns.</p>
            <form action="/log_meal" method="post">
                <input type="text" name="food_name" class="form-control mb-3" placeholder="What did you eat?" required>
                <button type="submit" class="btn btn-outline-success w-100">Log Meal</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
