{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card p-4 mb-4">
            <h3 class="h5">Log New Symptom</h3>
            <form action="/add_symptom" method="post">
                <input type="text" name="symptom" class="form-control mb-2" placeholder="Symptom (e.g. Bloating)" required>
                <label class="small">Severity (1-10)</label>
                <input type="range" name="severity" class="form-range mb-2" min="1" max="10">
                <textarea name="note" class="form-control mb-3" placeholder="Notes..."></textarea>
                <button type="submit" class="btn btn-success w-100">Save Log</button>
            </form>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="h5">Symptom History</h3>
            <div class="list-group list-group-flush">
                {% for log in logs %}
                <div class="list-group-item">
                    <div class="d-flex w-100 justify-content-between">
                        <h6 class="mb-1">{{ log.symptom }}</h6>
                        <span class="badge bg-secondary">Severity: {{ log.severity }}</span>
                    </div>
                    <p class="mb-1 text-muted">{{ log.note }}</p>
                    <small class="text-black-50">{{ log.timestamp }}</small>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
