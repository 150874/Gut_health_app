<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Logout • Gut Health</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        :root{
            --primary: #2d6a4f;
            --secondary: #40916c;
            --light-bg: #f8fafc;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(
                135deg,
                #f8fafc,
                #eef6f1
            );

            height:100vh;

            display:flex;
            align-items:center;
            justify-content:center;

            padding:20px;
        }

        .logout-container{

            width:100%;
            max-width:420px;

        }

        .logout-card{

            background:white;

            border-radius:28px;

            padding:45px 35px;

            box-shadow:
                0 10px 25px rgba(0,0,0,0.05);

            border:1px solid var(--border);

            animation:fadeIn 0.5s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(15px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .icon-wrapper{

            width:85px;
            height:85px;

            background:#f1f5f9;

            border-radius:50%;

            display:flex;
            align-items:center;
            justify-content:center;

            margin:0 auto 25px auto;
        }

        .icon-wrapper i{

            font-size:2.5rem;
            color:var(--primary);
        }

        .logout-title{

            font-size:1.8rem;
            font-weight:700;

            color:var(--text-dark);

            text-align:center;

            margin-bottom:10px;
        }

        .logout-text{

            text-align:center;

            color:var(--text-light);

            font-size:0.95rem;

            line-height:1.7;

            margin-bottom:35px;
        }

        .btn-logout{

            background:var(--danger);

            color:white;

            border:none;

            border-radius:16px;

            padding:14px;

            font-weight:600;

            transition:0.3s;

            width:100%;
        }

        .btn-logout:hover{

            background:var(--danger-hover);

            transform:translateY(-2px);

            color:white;
        }

        .btn-cancel{

            background:white;

            border:1px solid var(--border);

            color:var(--text-dark);

            border-radius:16px;

            padding:14px;

            font-weight:600;

            transition:0.3s;

            width:100%;
        }

        .btn-cancel:hover{

            background:#f8fafc;

            transform:translateY(-2px);
        }

        .session-box{

            background:#f8fafc;

            border:1px solid #e2e8f0;

            border-radius:16px;

            padding:15px;

            margin-bottom:25px;
        }

        .session-box small{

            color:var(--text-light);
        }

        .session-box strong{

            color:var(--text-dark);
        }

    </style>
</head>

<body>

<div class="logout-container">

    <div class="logout-card">

        <!-- ICON -->
        <div class="icon-wrapper">
            <i class="bi bi-box-arrow-right"></i>
        </div>

        <!-- TITLE -->
        <h1 class="logout-title">
            Log Out?
        </h1>

        <!-- TEXT -->
        <p class="logout-text">
            You are about to end your current session.
            Your gut health logs, symptoms, and medication progress
            have already been saved safely.
        </p>

        <!-- SESSION INFO -->
        <div class="session-box text-center">

            <small>Logged in as</small>

            <br>

            <strong>
                {{ session["user_name"] }}
            </strong>

        </div>

        <!-- LOGOUT BUTTON -->
        <form action="/confirm_logout" method="POST">

            <button type="submit" class="btn btn-logout mb-3">

                <i class="bi bi-box-arrow-right me-2"></i>

                Yes, Log Me Out

            </button>

        </form>

        <!-- CANCEL -->
        <a href="/" class="btn btn-cancel">

            <i class="bi bi-arrow-left me-2"></i>

            Stay Logged In

        </a>

    </div>

</div>

</body>
</html>
