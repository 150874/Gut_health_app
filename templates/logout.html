<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Out - Gut Health</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --gh-forest-green: #2d6a4f;
            --gh-blue: #4a6fa5;
            --gh-bg: #f8fafc;
        }
        body { 
            background-color: var(--gh-bg); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-card { 
            border-radius: 20px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px;
        }
        .brand-icon { 
            background-color: #f1f5f9; 
            color: #64748b; 
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 20px auto;
        }
        .btn-logout {
            background-color: #ef4444; /* Alert red for exit actions */
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
        }
        .btn-logout:hover {
            background-color: #dc2626;
            color: white;
        }
        .btn-cancel {
            background-color: transparent;
            color: #64748b;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .btn-cancel:hover {
            background-color: #f8fafc;
            color: #334155;
        }
    </style>
</head>
<body>

<div class="logout-card text-center">
    <div class="brand-icon">
        <i class="bi bi-box-arrow-right"></i>
    </div>
    
    <h2 class="h4 fw-bold mb-2">Log Out?</h2>
    <p class="text-muted small mb-4">Are you sure you want to end your session? Your progress for today has been saved.</p>

    <div class="d-grid gap-2">
        <form action="/logout" method="POST">
            <button type="submit" class="btn btn-logout w-100 mb-2">Yes, Log Out</button>
        </form>
        <a href="/" class="btn btn-cancel w-100">Cancel and Stay</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
