<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gut Health</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --gh-forest-green: #2d6a4f; /* Calming forest green  */
            --gh-blue: #4a6fa5;
            --gh-bg: #f8fafc;
        }
        body { 
            background-color: var(--gh-bg); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { 
            border-radius: 20px; /* Rounded corners for consistency  */
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px;
        }
        .brand-icon { 
            background-color: var(--gh-forest-green); 
            color: white; 
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 15px auto;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            background-color: #f1f5f9;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.1);
            border-color: var(--gh-blue);
        }
        .btn-gh {
            background-color: var(--gh-blue);
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
        }
        .btn-gh:hover {
            background-color: #3b5a87;
            color: white;
        }
        .signup-link {
            text-decoration: none;
            color: var(--gh-forest-green);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="brand-icon">
        <i class="bi bi-heart-fill"></i>
    </div>
    <h2 class="h4 fw-bold mb-1">Welcome Back</h2>
    <p class="text-muted small mb-4">Manage your gut health with ease</p>

    <form method="POST">
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold text-muted">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label small fw-bold text-muted">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-gh w-100 mb-3">Login</button>
    </form>

    <div class="mt-2 small">
        <span class="text-muted">New here?</span> 
        <a href="/signup" class="signup-link ms-1">Create account</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
